<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Unwilt Dashboard</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a32;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --danger: #ef4444;
    --success: #22c55e;
    --text: #e8e8f0;
    --text2: #888898;
    --text3: #555565;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --row-h: 42px;
    --header-h: 52px;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: radial-gradient(ellipse at 60% 40%, #1a1a2e 0%, var(--bg) 70%); }
  .login-card { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px 36px; box-shadow: 0 24px 80px rgba(0,0,0,.6); }
  .login-brand { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 32px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); font-family: var(--mono); }
  .field input { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 11px 14px; outline: none; transition: border-color .2s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  #login-error { font-size: 12px; color: var(--danger); min-height: 18px; font-family: var(--mono); margin-bottom: 10px; }
  .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:active { transform: scale(.98); }

  /* DASHBOARD */
  #dashboard { display: none; flex-direction: column; height: 100vh; }

  .topbar { min-height: 54px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; flex-wrap: wrap; }
  .topbar-brand { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); display: block; }
  .collection-label { font-size: 12px; color: var(--text2); font-family: var(--mono); }
  .collection-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 10px; border-radius: 6px; outline: none; cursor: pointer; max-width: 150px; }
  .spacer { flex: 1; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }
  .user-email { font-size: 12px; color: var(--text2); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }

  .btn-sm { padding: 7px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all .15s; font-family: var(--sans); background: transparent; color: var(--text); white-space: nowrap; }
  .btn-sm:hover { background: var(--surface2); border-color: var(--text3); }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }
  .btn-sm.danger:hover { background: rgba(239,68,68,.1); }
  .btn-sm.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm.accent:hover { opacity: .85; }

  /* FILTER BAR */
  .filter-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .filter-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); white-space: nowrap; }

  .filter-global { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 10px; outline: none; }
  .filter-col-select, .filter-op-select, .filter-val-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 10px; border-radius: 6px; outline: none; }
  .filter-val-input { width: 100px; }

  #active-filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; width: 100%; }
  .filter-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3); border-radius: 20px; padding: 3px 8px 3px 10px; font-family: var(--mono); font-size: 11px; color: var(--accent); }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
  #record-count, #selected-count { font-family: var(--mono); font-size: 11px; white-space: nowrap; }

  /* TABLE */
  .table-wrapper { flex: 1; overflow: auto; width: 100%; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; } /* Ensures table doesn't squish too much */
  thead { position: sticky; top: 0; z-index: 10; }
  
  th, td { padding: 0 14px; vertical-align: middle; font-family: var(--mono); border-bottom: 1px solid var(--border); }
  th { height: var(--header-h); background: var(--surface2); color: var(--text3); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; text-align: left; }
  td { height: var(--row-h); color: var(--text); }

  .cell-val { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 32px 80px rgba(0,0,0,.7); }

  /* MOBILE RESPONSIVE ADAPTATIONS */
  @media (max-width: 768px) {
    .topbar { height: auto; padding: 10px 16px; }
    .topbar-brand { order: 1; }
    .user-email { display: none; } /* Hide email on small screens to save space */
    .topbar-sep:nth-of-type(1) { display: none; }
    
    .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; }
    .filter-global { max-width: 100%; min-width: 0; }
    .filter-controls { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-val-input { flex: 1; min-width: 80px; }
    
    .toolbar { justify-content: space-between; }
    .toolbar .spacer { display: none; }
  }

  /* Custom styling for the filter row to wrap better on mobile */
  .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; width: 100%; }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--text2); background: rgba(255,255,255,.03); }
  th.sort-asc, th.sort-desc { color: var(--accent); }

  .sort-icon { display: inline-block; margin-left: 5px; font-size: 10px; opacity: .4; vertical-align: middle; }
  th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; color: var(--accent); }

  th.col-check { width: 44px; padding: 0 14px; cursor: default; }
  th.col-actions { width: 54px; text-align: center; cursor: default; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.selected { background: rgba(79,142,247,.08) !important; border-bottom-color: rgba(79,142,247,.2); }
  tbody tr.editing { background: rgba(124,58,237,.08) !important; }

  td { padding: 0 14px; height: var(--row-h); vertical-align: middle; font-family: var(--mono); font-size: 12px; color: var(--text); max-width: 220px; }
  td.col-check { width: 44px; }
  td.col-id { color: var(--text3); font-size: 10px; }
  td.col-actions { width: 54px; text-align: center; }

  .cell-val { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  .cell-val.is-array { color: var(--accent2); font-size: 10px; }
  .cell-val.is-number { color: #7dd3fc; }
  .cell-val.is-timestamp { color: #86efac; font-size: 10px; }
  .cell-val.is-bool { color: #fbbf24; }

  mark { background: rgba(79,142,247,.28); color: var(--text); border-radius: 2px; padding: 0 1px; }

  td .inline-input { background: var(--surface2); border: 1px solid var(--accent); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 4px 8px; width: 100%; max-width: 200px; outline: none; }

  input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  .trash-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px; border-radius: 5px; transition: color .15s, background .15s; display: inline-flex; align-items: center; justify-content: center; }
  .trash-btn:hover { color: var(--danger); background: rgba(239,68,68,.12); }

  .state-row td { text-align: center; padding: 60px; color: var(--text3); font-family: var(--mono); font-size: 12px; }

  #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--success); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 10px 16px; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: slideIn .2s ease; min-width: 220px; }
  .toast.error { border-left-color: var(--danger); }
  .toast.warn  { border-left-color: #f59e0b; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px 32px; width: 340px; box-shadow: 0 32px 80px rgba(0,0,0,.7); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">Unwilt</div>
    <div class="login-title">Admin</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email-input" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass-input" placeholder="••••••••" />
    </div>
    <div id="login-error"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">›_ DB</div>
    <div class="topbar-sep"></div>
    <span class="collection-label">Collection:</span>
    <select class="collection-select" id="coll-select" onchange="loadCollection()"></select>
    <div class="spacer"></div>
    <div class="status-dot"></div>
    <div class="user-email" id="user-email-label"></div>
    <div class="topbar-sep"></div>
    <button class="btn-sm" onclick="doLogout()">Sign Out</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Search</span>
    <input class="filter-global" id="filter-global" placeholder="Search all columns…" oninput="applyView()" />
    <div class="topbar-sep"></div>
    <span class="filter-label">Filter</span>
    <select class="filter-col-select" id="filter-col">
      <option value="">— column —</option>
    </select>
    <select class="filter-op-select" id="filter-op">
      <option value="contains">contains</option>
      <option value="equals">equals</option>
      <option value="starts">starts with</option>
      <option value="gt">&gt;</option>
      <option value="lt">&lt;</option>
      <option value="gte">≥</option>
      <option value="lte">≤</option>
    </select>
    <input class="filter-val-input" id="filter-val" placeholder="value…" />
    <button class="btn-sm" onclick="addFilter()">+ Add</button>
    <div id="active-filters"></div>
    <button class="filter-clear" id="clear-all-filters" style="display:none" onclick="clearAllFilters()">✕ clear all</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span id="record-count">— records</span>
    <span id="selected-count"></span>
    <div class="spacer"></div>
    <button class="btn-sm accent" onclick="exportXLSX()">↓ Download XLSX</button>
    <button class="btn-sm danger" id="delete-selected-btn" style="display:none" onclick="deleteSelected()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-.15em;margin-right:4px">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
      Delete Selected
    </button>
  </div>

  <div class="table-wrapper">
    <table id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3 id="modal-title">Confirm Delete</h3>
    <p id="modal-msg">Are you sure? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-sm danger" id="modal-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiD7eT8JqfcOUC6SrtR7SInSOJtPRf42A",
  authDomain: "pangea-a30c9.firebaseapp.com",
  projectId: "pangea-a30c9",
  storageBucket: "pangea-a30c9.firebasestorage.app",
  messagingSenderId: "779452675971",
  appId: "1:779452675971:web:98aa281eac3020b2ace8b6",
  measurementId: "G-DXZGGVMGQP"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

window._firebase = { auth, db, signInWithEmailAndPassword, signOut, collection, getDocs, doc, updateDoc, deleteDoc };
window._collections = ["testdata"];

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    const dash = document.getElementById('dashboard');
    dash.style.display = 'flex';
    document.getElementById('user-email-label').textContent = user.email;
    populateCollections();
    loadCollection();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }
});
</script>

<script>
// ═══ STATE ═══
let _rows     = [];
let _columns  = [];
let _selected = new Set();
let _editCell = null;
let _pendingDeleteIds = null;
let _sort     = { col: null, dir: 'asc' };
let _filters  = [];

// ═══ AUTH ═══
async function doLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pass  = document.getElementById('pass-input').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.textContent = '';
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    const { auth, signInWithEmailAndPassword } = window._firebase;
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = friendlyAuthError(e.code);
  } finally {
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
}
window.doLogin = doLogin;

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

async function doLogout() {
  const { auth, signOut } = window._firebase;
  await signOut(auth);
}
window.doLogout = doLogout;

function friendlyAuthError(code) {
  if (code === 'auth/invalid-email') return 'Invalid email address.';
  if (code === 'auth/user-not-found') return 'No user found with that email.';
  if (code === 'auth/wrong-password') return 'Incorrect password.';
  if (code === 'auth/invalid-credential') return 'Invalid credentials.';
  return 'Login failed. Check credentials.';
}

// ═══ COLLECTIONS ═══
function populateCollections() {
  const sel = document.getElementById('coll-select');
  sel.innerHTML = '';
  (window._collections || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

async function loadCollection() {
  const collName = document.getElementById('coll-select').value;
  if (!collName) return;
  _selected.clear();
  _sort = { col: null, dir: 'asc' };
  _filters = [];
  document.getElementById('filter-global').value = '';
  renderFilterChips();
  updateSelectedUI();
  setTableLoading(true);
  try {
    const { db, collection, getDocs } = window._firebase;
    const snap = await getDocs(collection(db, collName));
    _rows = snap.docs.map(d => ({ id: d.id, data: d.data() }));
    buildColumns();
    populateFilterColSelect();
    applyView();
  } catch(e) {
    toast('Error loading collection: ' + e.message, 'error');
    setTableLoading(false);
  }
}
window.loadCollection = loadCollection;

// ═══ COLUMNS ═══
function buildColumns() {
  const keys = new Set();
  _rows.forEach(r => Object.keys(r.data).forEach(k => keys.add(k)));
  _columns = Array.from(keys);
}

function populateFilterColSelect() {
  const sel = document.getElementById('filter-col');
  sel.innerHTML = '<option value="">— column —</option>';
  ['doc_id', ..._columns].forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

// ═══ SORT ═══
function toggleSort(col) {
  if (_sort.col === col) {
    _sort.dir = _sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    _sort.col = col;
    _sort.dir = 'asc';
  }
  applyView();
}
window.toggleSort = toggleSort;

function getSortedRows(rows) {
  if (!_sort.col) return [...rows];
  return [...rows].sort((a, b) => {
    const av = _sort.col === 'doc_id' ? a.id : (a.data[_sort.col] ?? '');
    const bv = _sort.col === 'doc_id' ? b.id : (b.data[_sort.col] ?? '');
    const an = typeof av === 'number' ? av : String(av).toLowerCase();
    const bn = typeof bv === 'number' ? bv : String(bv).toLowerCase();
    if (an < bn) return _sort.dir === 'asc' ? -1 : 1;
    if (an > bn) return _sort.dir === 'asc' ?  1 : -1;
    return 0;
  });
}

// ═══ FILTER ═══
function addFilter() {
  const col = document.getElementById('filter-col').value;
  const op  = document.getElementById('filter-op').value;
  const val = document.getElementById('filter-val').value.trim();
  if (!col || val === '') { toast('Select a column and enter a value', 'warn'); return; }
  _filters.push({ col, op, val });
  document.getElementById('filter-val').value = '';
  renderFilterChips();
  applyView();
}
window.addFilter = addFilter;

function removeFilter(i) {
  _filters.splice(i, 1);
  renderFilterChips();
  applyView();
}
window.removeFilter = removeFilter;

function clearAllFilters() {
  _filters = [];
  document.getElementById('filter-global').value = '';
  renderFilterChips();
  applyView();
}
window.clearAllFilters = clearAllFilters;

function renderFilterChips() {
  const container = document.getElementById('active-filters');
  const clearBtn  = document.getElementById('clear-all-filters');
  container.innerHTML = _filters.map((f, i) => {
    const opLabel = { contains:'contains', equals:'=', starts:'starts', gt:'>', lt:'<', gte:'≥', lte:'≤' }[f.op] || f.op;
    return `<span class="filter-chip">${escHtml(f.col)} <span style="opacity:.6">${opLabel}</span> "${escHtml(f.val)}"
      <button class="chip-remove" onclick="removeFilter(${i})">×</button>
    </span>`;
  }).join('');
  const hasAny = _filters.length > 0 || document.getElementById('filter-global').value.trim();
  clearBtn.style.display = hasAny ? 'inline-block' : 'none';
}

function matchesOp(raw, op, val) {
  const s  = String(raw ?? '').toLowerCase();
  const v  = val.toLowerCase();
  const n  = parseFloat(raw);
  const nv = parseFloat(val);
  switch (op) {
    case 'contains': return s.includes(v);
    case 'equals':   return s === v;
    case 'starts':   return s.startsWith(v);
    case 'gt':  return !isNaN(n) && !isNaN(nv) ? n > nv  : s > v;
    case 'lt':  return !isNaN(n) && !isNaN(nv) ? n < nv  : s < v;
    case 'gte': return !isNaN(n) && !isNaN(nv) ? n >= nv : s >= v;
    case 'lte': return !isNaN(n) && !isNaN(nv) ? n <= nv : s <= v;
    default: return true;
  }
}

function getFilteredRows(rows) {
  const global = document.getElementById('filter-global')?.value.trim().toLowerCase() || '';
  return rows.filter(row => {
    if (global) {
      const allText = [row.id, ..._columns.map(c => rawStr(row.data[c]))].join(' ').toLowerCase();
      if (!allText.includes(global)) return false;
    }
    for (const f of _filters) {
      const raw = f.col === 'doc_id' ? row.id : row.data[f.col];
      if (!matchesOp(raw, f.op, f.val)) return false;
    }
    return true;
  });
}

function rawStr(val) {
  if (val === undefined || val === null) return '';
  if (Array.isArray(val)) return JSON.stringify(val);
  if (typeof val === 'object' && val?.seconds) return new Date(val.seconds * 1000).toLocaleString();
  if (typeof val === 'object') return JSON.stringify(val);
  return String(val);
}

// ═══ APPLY VIEW ═══
function applyView() {
  const filtered = getFilteredRows(_rows);
  const sorted   = getSortedRows(filtered);
  renderTable(sorted);
  const hasAny = _filters.length > 0 || document.getElementById('filter-global').value.trim();
  document.getElementById('clear-all-filters').style.display = hasAny ? 'inline-block' : 'none';
}
window.applyView = applyView;

// ═══ RENDER ═══
function renderTable(rows) {
  renderHead();
  renderBody(rows);
  const shown = rows.length, total = _rows.length;
  document.getElementById('record-count').textContent =
    shown < total ? `${shown} of ${total} records` : `${total} record${total !== 1 ? 's' : ''}`;
}

function sortIcon(col) {
  if (_sort.col !== col) return '<span class="sort-icon">⇅</span>';
  return `<span class="sort-icon">${_sort.dir === 'asc' ? '↑' : '↓'}</span>`;
}

function sortClass(col) {
  return 'sortable' + (_sort.col === col ? ` sort-${_sort.dir}` : '');
}

function renderHead() {
  const head = document.getElementById('table-head');
  const allChecked = _rows.length > 0 && _rows.every(r => _selected.has(r.id));
  head.innerHTML = `<tr>
    <th class="col-check">
      <input type="checkbox" id="check-all" ${allChecked ? 'checked' : ''} onchange="toggleSelectAll(this.checked)">
    </th>
    <th class="${sortClass('doc_id')}" onclick="toggleSort('doc_id')">doc_id${sortIcon('doc_id')}</th>
    ${_columns.map(c => `<th class="${sortClass(c)}" onclick="toggleSort('${c}')">${escHtml(c)}${sortIcon(c)}</th>`).join('')}
    <th class="col-actions"></th>
  </tr>`;
}

function renderBody(rows) {
  const tbody = document.getElementById('table-body');
  const globalTerm = document.getElementById('filter-global')?.value.trim().toLowerCase() || '';

  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="${_columns.length + 3}">No matching records.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(row => {
    const sel = _selected.has(row.id);
    return `<tr id="row-${row.id}" class="${sel ? 'selected' : ''}" onclick="rowClick(event,'${row.id}')">
      <td class="col-check" onclick="event.stopPropagation()">
        <input type="checkbox" ${sel ? 'checked' : ''} onchange="toggleRow('${row.id}', this.checked)">
      </td>
      <td class="col-id"><span class="cell-val">${highlight(escHtml(row.id), globalTerm)}</span></td>
      ${_columns.map(col => {
        const val = row.data[col];
        const { display, cls } = formatVal(val);
        return `<td ondblclick="startEdit(event,'${row.id}','${col}')">
          <span class="cell-val ${cls}" title="${escHtml(display)}">${highlight(escHtml(display), globalTerm)}</span>
        </td>`;
      }).join('')}
      <td class="col-actions" onclick="event.stopPropagation()">
        <button class="trash-btn" title="Delete row" onclick="confirmDeleteOne('${row.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </td>
    </tr>`;
  }).join('');
}

function highlight(text, term) {
  if (!term) return text;
  const lower = text.toLowerCase();
  const idx = lower.indexOf(term);
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + term.length) + '</mark>' + text.slice(idx + term.length);
}

function setTableLoading(on) {
  const tbody = document.getElementById('table-body');
  if (on) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="20"><span class="spinner"></span> Loading…</td></tr>`;
    document.getElementById('table-head').innerHTML = '';
  }
}

// ═══ FORMAT ═══
function formatVal(val) {
  if (val === undefined || val === null)   return { display: '—', cls: '' };
  if (Array.isArray(val))                  return { display: `[array · ${val.length}]`, cls: 'is-array' };
  if (typeof val === 'object' && val?.toDate) return { display: val.toDate().toLocaleString(), cls: 'is-timestamp' };
  if (typeof val === 'object' && val?.seconds) return { display: new Date(val.seconds * 1000).toLocaleString(), cls: 'is-timestamp' };
  if (typeof val === 'object')             return { display: JSON.stringify(val), cls: '' };
  if (typeof val === 'number')             return { display: String(val), cls: 'is-number' };
  if (typeof val === 'boolean')            return { display: String(val), cls: 'is-bool' };
  return { display: String(val), cls: '' };
}

// ═══ SELECTION ═══
function rowClick(e, id) {
  if (e.target.tagName === 'INPUT') return;
  toggleRow(id, !_selected.has(id));
  syncCheckboxForRow(id);
}
window.rowClick = rowClick;

function toggleRow(id, checked) {
  if (checked) _selected.add(id); else _selected.delete(id);
  const tr = document.getElementById(`row-${id}`);
  if (tr) tr.classList.toggle('selected', checked);
  const cb = tr?.querySelector('input[type=checkbox]');
  if (cb) cb.checked = checked;
  updateSelectedUI();
  syncHeaderCheckbox();
}
window.toggleRow = toggleRow;

function toggleSelectAll(checked) {
  _rows.forEach(r => toggleRow(r.id, checked));
  updateSelectedUI();
}
window.toggleSelectAll = toggleSelectAll;

function syncHeaderCheckbox() {
  const cb = document.getElementById('check-all');
  if (!cb) return;
  cb.checked = _rows.length > 0 && _rows.every(r => _selected.has(r.id));
  cb.indeterminate = _selected.size > 0 && !cb.checked;
}

function syncCheckboxForRow(id) {
  const tr = document.getElementById(`row-${id}`);
  const cb = tr?.querySelector('input[type=checkbox]');
  if (cb) cb.checked = _selected.has(id);
}

function updateSelectedUI() {
  const n = _selected.size;
  document.getElementById('selected-count').textContent = n ? `${n} selected` : '';
  document.getElementById('delete-selected-btn').style.display = n > 0 ? 'inline-block' : 'none';
}

// ═══ INLINE EDIT ═══
function startEdit(e, rowId, col) {
  e.stopPropagation();
  cancelEdit(false);
  const row = _rows.find(r => r.id === rowId);
  if (!row) return;
  const val = row.data[col];
  if (Array.isArray(val) || (typeof val === 'object' && val !== null && !val?.seconds)) return;

  const td = e.currentTarget;
  const displayVal = (typeof val === 'object' && val?.seconds)
    ? new Date(val.seconds * 1000).toISOString()
    : (val ?? '');

  const input = document.createElement('input');
  input.className = 'inline-input';
  input.value = String(displayVal);
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.select();

  document.getElementById(`row-${rowId}`).classList.add('editing');
  _editCell = { rowId, col, td, origVal: val, input };

  input.addEventListener('keydown', async ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); await commitEdit(); }
    if (ev.key === 'Escape') { cancelEdit(true); }
  });
  input.addEventListener('blur', () => setTimeout(commitEdit, 100));
}
window.startEdit = startEdit;

async function commitEdit() {
  if (!_editCell) return;
  const { rowId, col, td, origVal, input } = _editCell;
  _editCell = null;

  const newStr = input.value;
  let newVal;
  if (typeof origVal === 'number') {
    newVal = Number(newStr);
    if (isNaN(newVal)) { toast('Invalid number', 'error'); cancelEdit(true); return; }
  } else if (typeof origVal === 'boolean') {
    newVal = newStr === 'true';
  } else {
    newVal = newStr;
  }

  const row = _rows.find(r => r.id === rowId);
  if (!row) return;

  row.data[col] = newVal;
  const { display, cls } = formatVal(newVal);
  td.innerHTML = `<span class="cell-val ${cls}">${escHtml(display)}</span>`;
  document.getElementById(`row-${rowId}`)?.classList.remove('editing');

  try {
    const { db, doc, updateDoc } = window._firebase;
    const collName = document.getElementById('coll-select').value;
    await updateDoc(doc(db, collName, rowId), { [col]: newVal });
    toast('✓ Saved');
  } catch(e) {
    toast('Update failed: ' + e.message, 'error');
    row.data[col] = origVal;
    const { display: d2, cls: c2 } = formatVal(origVal);
    td.innerHTML = `<span class="cell-val ${c2}">${escHtml(d2)}</span>`;
  }
}

function cancelEdit(restore) {
  if (!_editCell) return;
  const { rowId, col, td, origVal } = _editCell;
  _editCell = null;
  if (restore) {
    const { display, cls } = formatVal(origVal);
    td.innerHTML = `<span class="cell-val ${cls}">${escHtml(display)}</span>`;
  }
  document.getElementById(`row-${rowId}`)?.classList.remove('editing');
}

// ═══ DELETE ═══
function confirmDeleteOne(id) {
  _pendingDeleteIds = [id];
  openModal('Delete Document', `Delete document <code>${id}</code>? This cannot be undone.`);
}
window.confirmDeleteOne = confirmDeleteOne;

function deleteSelected() {
  _pendingDeleteIds = Array.from(_selected);
  openModal('Delete Selected', `Delete ${_pendingDeleteIds.length} document(s)? This cannot be undone.`);
}
window.deleteSelected = deleteSelected;

async function executeDelete() {
  closeModal();
  if (!_pendingDeleteIds?.length) return;
  const { db, doc, deleteDoc } = window._firebase;
  const collName = document.getElementById('coll-select').value;
  let ok = 0, fail = 0;
  for (const id of _pendingDeleteIds) {
    try {
      await deleteDoc(doc(db, collName, id));
      _rows = _rows.filter(r => r.id !== id);
      _selected.delete(id);
      ok++;
    } catch(e) { fail++; }
  }
  _pendingDeleteIds = null;
  buildColumns();
  applyView();
  updateSelectedUI();
  if (ok)   toast(`✓ Deleted ${ok} document(s)`);
  if (fail) toast(`${fail} deletion(s) failed`, 'error');
}

// ═══ MODAL ═══
function openModal(title, msg) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').innerHTML = msg;
  document.getElementById('modal-confirm-btn').onclick = executeDelete;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeModal() { document.getElementById('confirm-modal').classList.remove('open'); }
window.closeModal = closeModal;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ═══ XLSX EXPORT ═══
function exportXLSX() {
  if (!window.XLSX) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = doExport;
    document.head.appendChild(s);
  } else { doExport(); }
}
window.exportXLSX = exportXLSX;

function doExport() {
  const XLSX = window.XLSX;
  // exports current filtered+sorted view
  const filtered = getFilteredRows(_rows);
  const sorted   = getSortedRows(filtered);
  const headers  = ['doc_id', ..._columns];
  const data = sorted.map(r => {
    const row = { doc_id: r.id };
    _columns.forEach(c => {
      const v = r.data[c];
      if (v === undefined || v === null) { row[c] = ''; return; }
      if (Array.isArray(v)) { row[c] = JSON.stringify(v); return; }
      if (typeof v === 'object' && v?.seconds) { row[c] = new Date(v.seconds*1000).toISOString(); return; }
      if (typeof v === 'object') { row[c] = JSON.stringify(v); return; }
      row[c] = v;
    });
    return row;
  });
  const ws = XLSX.utils.json_to_sheet(data, { header: headers });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  const collName = document.getElementById('coll-select').value || 'export';
  XLSX.writeFile(wb, `${collName}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ XLSX downloaded');
}

// ═══ TOAST ═══
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ═══ UTILS ═══
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter on filter-val adds filter
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('filter-val')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') addFilter();
  });
});
</script>
</body>
